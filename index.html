<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElderCare - Selector de Roles</title>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Estilos globales -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="index-page">

    <div class="role-selector-card">
        <div class="role-selector-icon">
            <i class="fa-solid fa-heart-pulse"></i>
        </div>
        <h1 class="role-selector-title">ElderCare System</h1>
        <p class="role-selector-subtitle">Selecciona el perfil para ingresar al demo</p>

        <!-- Enlace a Médico -->
        <a href="medico/dashboard.html" class="btn-role btn-doctor">
            <i class="fa-solid fa-user-doctor"></i> Entrar como Médico
        </a>

        <!-- Enlace a Cuidador -->
        <a href="cuidador/dashboard.html" class="btn-role btn-caregiver">
            <i class="fa-solid fa-hands-holding-circle"></i> Entrar como Cuidador
        </a>

        <!-- Enlace a Admin -->
        <a href="admin/admin-dashboard.html" class="btn-role btn-admin">
            <i class="fa-solid fa-user-shield"></i> Entrar como Administrador
        </a>

        <div class="role-selector-footer">
            <a href="login.html" class="role-login-link">O ir a pantalla de Login</a>
        </div>
    </div>

</body>
</html>
