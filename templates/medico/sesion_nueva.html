{% extends 'base.html' %}

{% block title %}Nueva Sesión - ElderCare{% endblock %}
{% block page_title %}Nueva Sesión Clínica{% endblock %}
{% block search_placeholder %}Buscar...{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="card" style="padding: 32px;">
        <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 24px; color: var(--text-primary);">
            <i class="fa-solid fa-calendar-plus"></i> Registrar Sesión Clínica
        </h3>

        <form method="POST" action="{{ url_for('medico_sesion_nueva') }}">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Paciente *</label>
                    <select name="id_paciente" class="form-input" required>
                        <option value="">Seleccionar paciente...</option>
                        {% for p in pacientes %}
                        <option value="{{ p['id_paciente'] }}">{{ p['nombre'] }} {{ p['apellidos'] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Fecha y Hora *</label>
                    <input type="datetime-local" name="fecha_sesion" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Tipo de Sesión *</label>
                    <select name="tipo_sesion" class="form-input" required>
                        <option value="">Seleccionar...</option>
                        <option value="Individual">Individual</option>
                        <option value="Grupal">Grupal</option>
                        <option value="Virtual">Virtual</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Duración (minutos)</label>
                    <input type="number" name="duracion_min" class="form-input" min="1" max="480" placeholder="50">
                </div>

                <div class="form-group">
                    <label class="form-label">Estado Emocional Inicio (1–10)</label>
                    <input type="number" name="estado_emoc_inicio" class="form-input" min="1" max="10">
                </div>

                <div class="form-group">
                    <label class="form-label">Estado Emocional Fin (1–10)</label>
                    <input type="number" name="estado_emoc_fin" class="form-input" min="1" max="10">
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Notas Clínicas</label>
                    <textarea name="notas_clinicas" class="form-input" rows="4" placeholder="Observaciones de la sesión..."></textarea>
                </div>

            </div>

            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn-login" style="width: auto; padding: 10px 28px;">
                    <i class="fa-solid fa-save"></i> Guardar Sesión
                </button>
                <a href="{{ url_for('medico_sesiones') }}" class="btn-expediente" style="width: auto; padding: 10px 28px; text-decoration: none; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color);">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
