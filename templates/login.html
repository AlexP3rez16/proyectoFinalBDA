<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ElderCare</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>
            <h1 class="login-title">ElderCare</h1>
            <p class="login-subtitle">Sistema de Monitoreo de Salud</p>

            {% if error %}
            <div style="background: #fee2e2; color: #dc2626; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 14px;">
                <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label class="form-label" for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="ejemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>
            </form>

            <!-- Texto de ayuda para la demo -->
            <div class="helper-text">
                <strong>Usuarios de prueba</strong> (contraseña: 123)<br>
                <code>cmedina@clinica.com</code> — Admin<br>
                <code>jramirez@clinica.com</code> — Médico<br>
                <code>ltorres@clinica.com</code> — Médico
            </div>
        </div>
    </div>

</body>
</html>
