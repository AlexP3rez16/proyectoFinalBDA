{% extends 'base.html' %}

{% block title %}Nuevo Paciente - ElderCare{% endblock %}

{% block page_title %}Nuevo Paciente{% endblock %}
{% block search_placeholder %}Buscar...{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto;">
    <div class="card" style="padding: 32px;">
        <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 24px; color: var(--text-primary);">
            <i class="fa-solid fa-user-plus"></i> Registrar Nuevo Paciente
        </h3>

        <form method="POST" action="{{ url_for('admin_paciente_nuevo') }}">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">

                <div class="form-group">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="nombre" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Apellidos *</label>
                    <input type="text" name="apellidos" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Fecha de Nacimiento *</label>
                    <input type="date" name="fecha_nacimiento" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Sexo *</label>
                    <select name="sexo" class="form-input" required>
                        <option value="">Seleccionar...</option>
                        <option value="F">Femenino</option>
                        <option value="M">Masculino</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">CURP</label>
                    <input type="text" name="curp" class="form-input" maxlength="18">
                </div>

                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-input">
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Diagnóstico Principal</label>
                    <input type="text" name="diagnostico_principal" class="form-input">
                </div>

                <div class="form-group" style="grid-column: 1 / -1;">
                    <label class="form-label">Cuidador Asignado</label>
                    <select name="id_cuidador" class="form-input">
                        <option value="">Sin cuidador</option>
                        {% for c in cuidadores %}
                        <option value="{{ c['id_cuidador'] }}">{{ c['nombre'] }} {{ c['apellidos'] }}</option>
                        {% endfor %}
                    </select>
                </div>

            </div>

            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn-login" style="width: auto; padding: 10px 28px;">
                    <i class="fa-solid fa-save"></i> Guardar Paciente
                </button>
                <a href="{{ url_for('admin_pacientes') }}" class="btn-expediente" style="width: auto; padding: 10px 28px; text-decoration: none; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color);">
                    Cancelar
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
